spring.application.name=back

# DB (simple) : HSQLDB en fichier pour garder les joueurs entre redémarrages
spring.datasource.url=jdbc:hsqldb:file:${user.home}/facade-db/${spring.application.name};shutdown=true
spring.datasource.driverClassName=org.hsqldb.jdbc.JDBCDriver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Afficher les requêtes SQL (debug — comme dans le TP3)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

