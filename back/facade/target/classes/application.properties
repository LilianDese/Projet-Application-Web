spring.application.name=back

# DB HSQLDB en fichier pour garder les joueurs entre redémarrages.
# On stocke la DB dans le dossier DB/ à la racine du repo
spring.datasource.url=jdbc:hsqldb:file:${FACADE_DB_DIR:../../DB/facade-db}/${spring.application.name};shutdown=true


spring.datasource.driverClassName=org.hsqldb.jdbc.JDBCDriver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Afficher les requêtes SQL
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

