<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fond Jeu Uno</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <canvas id="rondFond" aria-hidden="true"></canvas>
    <div id="blur-overlay" aria-hidden="true"></div>

    <audio id="bg-music" src="assets/sons/background.mp3" loop preload="auto" aria-hidden="true"></audio>

    <div class="cards-center">
      <div class="cards-fan">
        <img class="card card-left" src="assets/images/Red_Skip.png" alt="Carte" draggable="false" />
        <img class="card card-deck" src="assets/images/Deck.png" alt="Deck" draggable="false" />
        <img class="card card-right" src="assets/images/Wild_Draw.png" alt="Carte" draggable="false" />
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
