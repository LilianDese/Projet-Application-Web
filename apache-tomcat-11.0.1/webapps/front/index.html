<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fond Jeu Uno</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" />
    <link rel="stylesheet" href="./styles.css?v=2" />
  </head>
  <body>
    <canvas id="rondFond" aria-hidden="true"></canvas>
    <div id="blur-overlay" aria-hidden="true"></div>

    <audio id="bg-music" src="assets/sons/background.mp3" loop preload="auto" aria-hidden="true"></audio>

    <div class="hud-left" aria-label="Volume">
      <label class="volume">
        <span>Volume</span>
        <input id="volume" type="range" min="0" max="100" value="3" />
      </label>
    </div>

    <div class="cards-center">
      <div class="cards-ui" aria-label="Menu">
        <h1 class="title">Uno Online</h1>
      </div>

      <div class="cards-fan">
        <img class="card card-left" src="assets/images/Red_Skip.png" alt="Carte" draggable="false" />
        <img class="card card-deck" src="assets/images/Deck.png" alt="Deck" draggable="false" />
        <img class="card card-right" src="assets/images/Wild_Draw.png" alt="Carte" draggable="false" />
      </div>
    </div>

  <div class="menu-panel" aria-label="Actions">
    <div id="menu-actions" class="menu-actions" role="group">
      <button id="btn-login" class="btn" type="button">Connexion</button>
      <button id="btn-register" class="btn" type="button">Nouveau Joueur</button>
    </div>
  </div>

    <div class="auth-panel" aria-label="Connexion">
      <form id="auth-form" class="auth-form" style="display:none" autocomplete="off">
        <input id="pseudo" class="input" type="text" placeholder="Pseudo" />
        <button id="btn-submit" class="btn btn-primary" type="submit">Valider</button>
      </form>
      <div id="auth-message" class="message" aria-live="polite"></div>
    </div>

    <div class="hud-right" aria-label="Joueur courant">
      <button id="btn-leaderboard" class="btn btn-small" type="button" style="display:none">Leaderboard</button>
      <button id="btn-logout" class="btn btn-small" type="button" style="display:none">Déconnexion</button>
      <div id="current-user" class="current-user"></div>
    </div>

    <div id="games-dock" class="games-dock" aria-label="Parties">
      <div class="panel games-panel">
        <div class="panel-head">
          <div class="panel-spacer" aria-hidden="true"></div>
          <div class="panel-title">Parties</div>
          <div class="panel-spacer" aria-hidden="true"></div>
        </div>
        <div class="panel-body">
          <div class="games-layout">
            <div id="games-content" class="games-grid" aria-live="polite"></div>
            <div class="games-side" aria-label="Créer une partie">
              <button id="btn-create-game" class="btn btn-small btn-primary" type="button">Créer partie</button>

              <form id="part-form" class="auth-form games-create-form" style="display:none" autocomplete="off">
                <input id="part-name" class="input" type="text" placeholder="Nom de la partie" />
                <button id="btn-part-submit" class="btn btn-primary" type="submit">Valider</button>
              </form>
              <div id="part-message" class="message" aria-live="polite"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="leaderboard-overlay" class="overlay" style="display:none" aria-label="Leaderboard">
      <div class="panel">
        <div class="panel-head">
          <button id="btn-leaderboard-back" class="btn btn-small" type="button">Retour</button>
          <div class="panel-title">Leaderboard</div>
          <div class="panel-spacer" aria-hidden="true"></div>
        </div>
        <div id="leaderboard-content" class="panel-body"></div>
      </div>
    </div>

    <div id="lobby-overlay" class="overlay" style="display:none" aria-label="Salon">
      <div class="panel">
        <div class="panel-head">
          <button id="btn-lobby-quit" class="btn btn-small" type="button">Quitter</button>
          <div id="lobby-title" class="panel-title">Salon</div>
          <div class="panel-spacer" aria-hidden="true"></div>
        </div>
        <div class="panel-body">
          <h3>Joueurs présents :</h3>
          <ul id="lobby-players" class="leaderboard-list"></ul>
          <div style="margin-top: 1rem; text-align: center;">
            <button id="btn-lobby-start" class="btn btn-primary" type="button" style="display:none;">Lancer la partie</button>
            <div id="lobby-message" class="message" style="margin-top: 0.5rem"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="./script.js?v=2"></script>
  </body>
</html>
