spring.application.name=back

# ----------------------------------------
# Configuration PostgreSQL
# ----------------------------------------
# localhost:5432 est l'adresse par défaut de PostgreSQL. 
# "uno_db" est le nom de la base de données (à créer, voir étape 3).
spring.datasource.url=jdbc:postgresql://localhost:5432/uno_db
spring.datasource.username=theo_armaghan
spring.datasource.password=clarou

# Le driver est généralement auto-détecté par Spring Boot avec PostgreSQL,
# tu n'as plus besoin de la ligne "spring.datasource.driverClassName".

# ----------------------------------------
# Configuration JPA / Hibernate
# ----------------------------------------
# "update" va créer les tables manquantes ou ajouter des colonnes 
# si tu modifies tes classes @Entity (parfait pour le développement).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Afficher les requêtes SQL (très pratique pour vérifier si ton leaderboard requête bien)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

